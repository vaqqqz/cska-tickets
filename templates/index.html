<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Билеты на ЦСКА · Спартак</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- ─── Фоновые частицы ──────────────────────────────────────────── -->
  <div class="bg-grid"></div>
  <div class="scanline"></div>

  <main class="container">

    <!-- Заголовок -->
    <header class="header">
      <div class="badge">СПАРТАК · МОНИТОРИНГ</div>
      <h1 class="title">ЕСТЬ ЛИ БИЛЕТЫ<br><span class="accent">НА ЦСКА?</span></h1>
    </header>

    
    <div class="box">
    <p>На сайте ведутся технические работы</p>
    <p>Подпишись, чтобы не пропустить обновления</p>
    <a href="https://t.me/kbfactory" target="_blank">
      Перейти в Telegram
    </a>

  </main>

  <script>
    // ─── Таймер обратного отсчёта ────────────────────────────────────
    const TARGET_DATE = new Date('2026-05-06T20:00:00');
    console.log('Target date:', TARGET_DATE);
    console.log('Current time:', new Date());

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateCountdown() {
      const now  = new Date();
      const diff = TARGET_DATE - now;

      console.log('Diff:', diff, 'ms');

      if (diff <= 0) {
        document.getElementById('countdown').textContent = '00·00·00·00';
        return;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000)  / 60000);
      const seconds = Math.floor((diff % 60000)    / 1000);

      const display = `${pad(days)}·${pad(hours)}·${pad(minutes)}·${pad(seconds)}`;
      console.log('Display:', display);
      document.getElementById('countdown').textContent = display;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // ─── Опрос API статуса ────────────────────────────────────────────
    const CHECK_INTERVAL_MS = {{ interval }} * 1000;

    async function fetchStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();

        const block = document.getElementById('status-block');
        const icon  = document.getElementById('status-icon');
        const text  = document.getElementById('status-text');

        // Обновляем статус
        if (data.last_status === 'found') {
          block.className = 'status-block found';
          icon.textContent = '🔴';
          text.textContent = 'ДА, БИЛЕТЫ ПОЯВИЛИСЬ!';
        } else if (data.last_status === 'not_found') {
          block.className = 'status-block not-found';
          icon.textContent = '⚪';
          text.textContent = 'ПОКА НЕТ БИЛЕТОВ';
        } else if (data.last_status === 'error') {
          block.className = 'status-block error';
          icon.textContent = '⚠️';
          text.textContent = 'ОШИБКА ПРОВЕРКИ';
        } else {
          block.className = 'status-block';
          icon.textContent = '⏳';
          text.textContent = 'Загрузка…';
        }

        // Мета
        if (data.last_check) {
          const d = new Date(data.last_check);
          document.getElementById('last-check').textContent =
            d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        document.getElementById('check-count').textContent = data.check_count || '—';

        // Ошибка
        const errRow = document.getElementById('error-row');
        if (data.error_msg) {
          errRow.style.display = 'flex';
          document.getElementById('error-msg').textContent = data.error_msg;
        } else {
          errRow.style.display = 'none';
        }

      } catch (e) {
        console.warn('Не удалось получить статус:', e);
      }
    }

    // Сразу и потом по интервалу
    fetchStatus();
    setInterval(fetchStatus, CHECK_INTERVAL_MS);
  </script>

</body>
</html>
